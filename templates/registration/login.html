{% extends 'base.html' %}

{% block title %}Login — FoodOrder{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="bg-white rounded-4 shadow p-5">
          <div class="text-center mb-4">
            <div style="font-size: 3rem;">🍽️</div>
            <h2 style="font-family: var(--font-display);">Welcome Back!</h2>
            <p class="text-muted">Sign in to your FoodOrder account</p>
          </div>

          <form method="POST">
            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger rounded-3">
              <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password.
            </div>
            {% endif %}

            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill" style="font-size: 1rem;">
              Sign In →
            </button>
          </form>

          <div class="divider"></div>

          <p class="text-center text-muted mb-0">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-primary fw-bold">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
